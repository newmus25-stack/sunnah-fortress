<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار نظام النشرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; padding: 20px; background: #f5f5f5; }
        .test-box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #667eea; margin-bottom: 15px; }
        .btn { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn:hover { background: #5568d3; }
        .result { background: #f0f0f0; padding: 10px; margin-top: 10px; border-radius: 5px; font-family: monospace; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 300px; margin-left: 10px; }
    </style>
</head>
<body>
    <h1>اختبار نظام النشرة البريدية</h1>
    
    <div class="test-box">
        <h2>1. إضافة مشترك</h2>
        <input type="email" id="testEmail" placeholder="بريد إلكتروني للاختبار">
        <button class="btn" onclick="testAdd()">إضافة</button>
        <button class="btn" onclick="testStats()">عرض الإحصائيات</button>
        <button class="btn" onclick="testList()">عرض القائمة</button>
        <button class="btn" onclick="testClear()">مسح الكل</button>
        <button class="btn" onclick="testExport()">تصدير CSV</button>
        <button class="btn" onclick="testBackup()">نسخة احتياطية</button>
        <div class="result" id="result"></div>
    </div>

    <script src="newsletter-config.js"></script>
    <script>
        function log(msg) {
            document.getElementById('result').innerHTML = msg + '<br>' + document.getElementById('result').innerHTML;
        }
        
        function testAdd() {
            const email = document.getElementById('testEmail').value;
            if (!email) {
                log('❌ أدخل بريداً إلكترونياً');
                return;
            }
            window.newsletter.addSubscriber(email).then(result => {
                log(result.message);
                console.log(result);
            });
        }
        
        function testStats() {
            const stats = window.newsletter.getStats();
            log(`الإحصائيات: إجمالي=${stats.total}، مؤكد=${stats.confirmed}، مؤقت=${stats.pending}، النسبة=${stats.percentage}%`);
        }
        
        function testList() {
            const subs = window.newsletter.subscribers;
            if (subs.length === 0) {
                log('لا يوجد مشتركين');
                return;
            }
            let msg = 'المشتركين:<br>';
            subs.forEach(s => {
                msg += `- ${s.email} (${s.confirmed ? 'مؤكد' : 'مؤقت'})<br>`;
            });
            log(msg);
        }
        
        function testClear() {
            window.newsletter.subscribers = [];
            window.newsletter.saveSubscribers();
            log('✅ تم مسح كل المشتركين');
        }
        
        function testExport() {
            window.newsletter.exportAsCSV();
            log('✅ تم تصدير CSV');
        }
        
        function testBackup() {
            window.newsletter.createBackup();
            log('✅ تم إنشاء نسخة احتياطية');
        }
        
        // فحص عند التحميل
        window.addEventListener('load', () => {
            if (window.newsletter) {
                log('✅ تم تحميل نظام النشرة بنجاح');
                testStats();
            } else {
                log('❌ فشل تحميل نظام النشرة');
            }
        });
    </script>
</body>
</html>
