<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العيوب المنهجية في كتابات المستشرق شاخت</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-inner">
            <div class="nav-brand">📖 تصفح الكتاب</div>
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="ابحث في الكتاب...">
            </div>
        </div>
    </nav>

    <!-- Layout -->
    <div class="app-layout">

        <!-- Sidebar (Right in RTL) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>فهرس المحتويات</h2>
            </div>
            <ul class="toc-list" id="toc-list">
                <!-- Dynamically generated -->
            </ul>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content" id="main-content">
            <div class="content-header" id="content-header">
                <h1 id="content-title">العيوب المنهجية في كتابات المستشرق شاخت المتعلقة بالسنة النبوية</h1>
                <p class="content-subtitle">مستخرج من موقع تراث - app.turath.io</p>
            </div>
            <div class="reading-area" id="reading-area">
                <p class="welcome-text">اختر مبحثاً من فهرس المحتويات على اليمين لبدء القراءة.</p>
            </div>
        </main>

    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
